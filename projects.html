<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conor Balen - Projects</title>

<style>
/* ================= GLOBAL ================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color: white;
  background: linear-gradient(-45deg, #0b0b0b, #111111, #1a1a1a, #0b0b0b);
  background-size: 400% 400%;
  animation: gradientShift 20s ease infinite;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* glow */
body::before,
body::after {
  content: "";
  position: fixed;
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(255,255,255,0.06), transparent 70%);
  z-index: -1;
  filter: blur(80px);
}

/* ================= HEADER ================= */
header {
  width: 100%;
  padding: 1rem 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 100;
}

nav {
  display: flex;
  justify-content: center;
  gap: 40px;
}

nav a {
  color: white;
  text-decoration: none;
  padding: 0.8rem 1.6rem;
  border-radius: 12px;
  font-weight: 600;
}

nav a:hover,
nav a.active {
  background: rgba(255,255,255,0.2);
  transform: scale(1.05);
}

/* ================= GRID ================= */
.projects-grid {
  width: 92%;
  max-width: 1200px;
  margin: 80px auto;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 40px;
}

/* ================= CARD (CLICKABLE AGAIN) ================= */
.project-card {
  position: relative;
  display: block;            /* IMPORTANT */
  border-radius: 24px;
  overflow: hidden;
  text-decoration: none;
  color: white;
  border: 2px solid white;
  background: rgba(255,255,255,0.05);
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.project-card:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 35px 80px rgba(0,0,0,0.8);
}

/* ================= MEDIA ================= */
.media-wrapper {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 10;
  overflow: hidden;
}

/* YouTube FIX (removes visible UI as much as possible) */
.media-wrapper iframe {
  width: 100%;
  height: 100%;
  border: 0;
  pointer-events: none; /* prevents clicking inside video */
}

/* Personal image */
.media-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: rgba(0,0,0,0.2);
}

/* ================= TEXT ================= */
.overlay {
  position: absolute;
  bottom: 15px;
  left: 20px;
  z-index: 5;
  pointer-events: none;
}

.overlay h2 {
  font-size: 1.6rem;
  font-weight: 600;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
}

/* ================= RESPONSIVE ================= */
@media (max-width: 768px) {
  .projects-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
<nav>
<a href="index.html">Home</a>
<a href="projects.html" class="active">Projects</a>
<a href="aboutme.html">About Me</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<div class="hero" style="text-align:center; margin-top:100px;">
  <h1>Explore My Work</h1>
</div>

<!-- ================= PROJECTS ================= -->
<div class="projects-grid">

  <!-- CARD 1 -->
  <a href="mobiledesign.html" class="project-card">
    <div class="media-wrapper">
      <iframe src="https://www.youtube.com/embed/T1tEcGEt9U0?autoplay=1&mute=1&loop=1&playlist=T1tEcGEt9U0&rel=0&modestbranding=1&controls=0"></iframe>
    </div>
    <div class="overlay"><h2>Mobile Design</h2></div>
  </a>

  <!-- CARD 2 -->
  <a href="personalprojects.html" class="project-card">
    <div class="media-wrapper">
      <img src="images/personal.gif" alt="Personal Projects">
    </div>
    <div class="overlay"><h2>Personal Projects</h2></div>
  </a>

  <!-- CARD 3 -->
  <a href="desktopdesign.html" class="project-card">
    <div class="media-wrapper">
      <iframe src="https://www.youtube.com/embed/_MaSIm5DDKE?autoplay=1&mute=1&loop=1&playlist=_MaSIm5DDKE&controls=0&modestbranding=1&rel=0"></iframe>
    </div>
    <div class="overlay"><h2>Desktop Design</h2></div>
  </a>

</div>

</body>
</html>
