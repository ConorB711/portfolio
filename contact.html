<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contact - Conor Balen</title>

<style>
/* ===== BODY ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;

  background: linear-gradient(-45deg, #0b0b0b, #111111, #1a1a1a, #0b0b0b);
  background-size: 400% 400%;
  animation: gradientShift 20s ease infinite;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ===== HEADER ===== */
header {
  width: 100%;
  padding: 1rem 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
}

nav {
  display: flex;
  justify-content: center;
  gap: 40px;
}

nav a {
  color: white;
  text-decoration: none;
  padding: 0.8rem 1.6rem;
  border-radius: 12px;
  font-weight: 600;
}

nav a:hover {
  background: rgba(255,255,255,0.2);
}

/* ===== HERO ===== */
.hero {
  text-align: center;
  margin-top: 80px;
}

.hero h1 {
  font-size: 3rem;
}

/* ===== CONTACT BOXES ===== */
.contact-info {
  margin-top: 40px;
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
  justify-content: center;
}

.info-box {
  padding: 20px 30px;
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
}

/* ===== FORM ===== */
form {
  margin-top: 50px;
  width: 90%;
  max-width: 500px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

input, textarea {
  padding: 14px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.08);
  color: white;
}

textarea {
  resize: none;
  height: 120px;
}

/* ===== BUTTON ===== */
button {
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: white;
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

</style>
</head>

<body>

<header>
  <nav>
    <a href="index.html">Home</a>
    <a href="projects.html">Projects</a>
    <a href="aboutme.html">About Me</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="hero">
  <h1>Contact Me</h1>
</div>

<!-- Contact Info -->
<div class="contact-info">
  <div class="info-box">
     Email: conbal711@gmail.com
  </div>

  <div class="info-box">
     Phone: (716)255-6643
  </div>
</div>

<!-- FORM (IMPORTANT PART) -->
<form action=https://formspree.io/f/mjgpzlek method="POST">
  <input type="text" name="name" placeholder="Your Name" required>
  <input type="email" name="email" placeholder="Your Email" required>
  <textarea name="message" placeholder="Your Message" required></textarea>

  <button type="submit">Submit</button>
</form>

</body>
</html>
